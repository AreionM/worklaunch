appId: com.alchemyintel.worklaunch
productName: WorkLaunch
directories:
  buildResources: resources
  output: dist

files:
  - out/**/*

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false

extraResources:
  - from: resources/icon.png
    to: icon.png
